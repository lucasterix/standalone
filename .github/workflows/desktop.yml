name: Desktop-Release (Tauri)

on:
  push:
    tags: ["desktop-v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with: { workspaces: "apps/desktop/src-tauri" }
      - run: npm install
        working-directory: apps/desktop
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Kontoklar Desktop ${{ github.ref_name }}"
          releaseBody: "Duenne Shell um die Live-Web-App - laedt immer den aktuellen Stand. macOS: Rechtsklick > Oeffnen (unsigniert). Windows: SmartScreen einmal bestaetigen."
          releaseDraft: false
          args: ${{ matrix.args }}
